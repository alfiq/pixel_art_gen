version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    post_create_environment:
      - curl -LsSf https://astral-sh/uv/install.sh | sh
      - uv sync --all-groups
    post_build:
      - uv run mkdocs build

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - dev
