version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    post_create_environment:
      # Use pip to install uv reliably in this environment
      - pip install uv
      # Sync dependencies using uv
      - uv sync --all-groups
    post_build:
      # Build the final documentation
      - uv run mkdocs build

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - dev
