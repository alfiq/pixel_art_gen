version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    post_create_environment:
      # Install uv
      - curl -LsSf https://astral-sh/uv/install.sh | sh
      # Create virtualenv and install dependencies
      - uv sync --all-groups
    post_build:
      - uv run mkdocs build

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - dev
