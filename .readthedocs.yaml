version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    install:
      # Use pip to install uv reliably in this environment
      - pip install uv
      # Install project and all extras directly into the RTD managed environment
      # This avoids the "Double Environment" issue where uv sync creates a separate .venv
      - uv pip install .[dev]

mkdocs:
  configuration: mkdocs.yml
